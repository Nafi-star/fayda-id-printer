services:
  postgres:
    image: postgres:15
    container_name: fayda-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fayda_printer
      # Dev convenience: allow host TCP connections without password issues.
      # Do NOT use this in production.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fayda-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: fayda-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Conversion worker: same Redis as Next.js on the host (port 6379). Callbacks to Next at host:3000.
  # Run: docker compose up -d redis worker  then  cd frontend && npm run dev
  # Match WORKER_CALLBACK_TOKEN in frontend/.env.local (and optional worker/.env).
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: fayda-worker
    depends_on:
      - redis
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      REDIS_URL: redis://redis:6379/0
      FRONTEND_BASE_URL: http://host.docker.internal:3000
      WORKER_CALLBACK_TOKEN: ${WORKER_CALLBACK_TOKEN:-dev-shared-token-change-me}
      STORAGE_ROOT: /app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
  minio_data:
