# Verifies the Next.js app builds without your local .env.local (Render-like).
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Not contacted during `next build`; satisfies modules that read env at runtime only.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: redis://127.0.0.1:6379
